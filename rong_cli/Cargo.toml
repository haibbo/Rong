[package]
name = "rong_cli"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "rong"
path = "src/main.rs"

[dependencies]
dirs = "6.0.0"
rong = { workspace = true }
rong_modules = { path = "../rong_modules", features = ["all"] }
rustyline = "17.0.2"

[features]
# Forward JS engine features to the main rong crate
default = ["quickjs"]
quickjs = ["rong/quickjs"]
jscore = ["rong/jscore"]
arkjs = ["rong/arkjs"]
