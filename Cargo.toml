[workspace]
members = [
    "core",
    "macro",
    "quickjs", "javascriptcore", "v8",
    "utils/rong_test",
    "examples/point",
    "modules/timer", "modules/navigator", "modules/path",
    "modules/rong_http", "modules/encoding", "modules/event",
    "modules/assert", "modules/dom-exception",
    "modules/abort", "modules/console", "modules/rong_url", "modules/buffer", "modules/fs",
    "rong_modules", "rong_cli"
]

[workspace.dependencies]
rong = { path = "."}

[package]
name = "rong"
version = "0.1.0"
edition = "2021"

[dependencies]
rong-core = { path = "core" }
rong-quickjs = { path = "quickjs", optional = true }
rongcore = { path = "javascriptcore", optional = true }
rong-v8 = { path = "v8", optional = true }
rong-macro = { path = "macro" }
tokio = { version = "1.0", features = ["rt", "time", "macros"] }
futures = "0.3.31"

[features]
quickjs = ["rong-quickjs"]
jscore = ["rongcore"]
v8 = ["rong-v8"]
default = ["quickjs"]

[dev-dependencies]
tokio = { version = "1.0", features = ["rt", "time", "macros"] }
rong_test = { path = "utils/rong_test" }

[profile.test]
debug = true

