[workspace]
members = [
    "core",
    "macro",
    "quickjs", "javascriptcore", "v8",
    "utils/rustyjs_test",
    "examples/point",
    "modules/timer", "modules/navigator", "modules/path",
    "modules/fetch", "modules/encoding", "modules/event",
    "modules/assert", "modules/dom-exception",
    "modules/abort", "modules/console", "modules/lxr_url", "modules/buffer",
]

[workspace.dependencies]
rusty-js = { path = "."}

[package]
name = "rusty-js"
version = "0.1.0"
edition = "2021"

[dependencies]
rusty-js-core = { path = "core" }
rusty-js-quickjs = { path = "quickjs", optional = true }
rusty-js-jscore = { path = "javascriptcore", optional = true }
rusty-js-v8 = { path = "v8", optional = true }
rusty-js-macro = { path = "macro" }
tokio = { version = "1.0", features = ["rt", "time", "macros"] }
futures = "0.3.31"

[features]
quickjs = ["rusty-js-quickjs"]
jscore = ["rusty-js-jscore"]
v8 = ["rusty-js-v8"]
default = ["quickjs"]

[dev-dependencies]
tokio = { version = "1.0", features = ["rt", "time", "macros"] }
rustyjs_test = { path = "utils/rustyjs_test" }

[profile.test]
debug = true

