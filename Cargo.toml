[workspace]
members = [
    "core",
    "macro",
    "quickjs", "javascriptcore", "arkjs",
    "utils/rong_test",
    "examples",
    "modules/rong_timer", "modules/rong_navigator", "modules/rong_path",
    "modules/rong_http", "modules/rong_encoding", "modules/rong_event",
    "modules/rong_assert", "modules/rong_exception", "modules/rong_storage",
    "modules/rong_abort", "modules/rong_console", "modules/rong_url", "modules/rong_buffer",
    "modules/rong_fs", "modules/rong_stream",
    "rong_modules", "rong_cli"
]

[workspace.dependencies]
# Internal dependencies
rong = { path = ".", default-features = false}
rong_core = { path = "core" }
rong_quickjs = { path = "quickjs" }
rong_jscore = { path = "javascriptcore" }
rong_arkjs = { path = "arkjs" }
rong_macro = { path = "macro" }
rong_test = { path = "utils/rong_test" }
rong_modules = { path = "rong_modules" }

# Module dependencies
rong_timer = { path = "modules/rong_timer" }
rong_console = { path = "modules/rong_console" }
rong_assert = { path = "modules/rong_assert" }
rong_fs = { path = "modules/rong_fs" }
rong_http = { path = "modules/rong_http" }
rong_encoding = { path = "modules/rong_encoding" }
rong_event = { path = "modules/rong_event" }
rong_exception = { path = "modules/rong_exception" }
rong_abort = { path = "modules/rong_abort" }
rong_url = { path = "modules/rong_url" }
rong_buffer = { path = "modules/rong_buffer" }
rong_stream = { path = "modules/rong_stream" }
rong_navigator = { path = "modules/rong_navigator" }
rong_path = { path = "modules/rong_path" }
rong_storage = { path = "modules/rong_storage" }

# External dependencies
tokio = { version = "1.0", features = ["rt", "rt-multi-thread", "time", "macros", "sync", "fs", "io-util"] }
futures = "0.3.31"
thiserror = "2.0.9"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Additional common dependencies
http = { package = "http", version = "1.2" }
http-body-util = "0.1.2"
hyper = { version = "1.7.0", features = ["client", "http1"] }
hyper-util = { version = "0.1.17", features = ["client", "http1", "tokio"] }
hyper-rustls = { version = "0.27.7", features = ["webpki-roots", "http1", "aws-lc-rs"] }
rustls = { version = "0.23", default-features = false }
flate2 = { version = "1.1.0" }
uuid = { version = "1.18.1", features = ["v4"] }
axum = { version = "0.8.6", features = ["http1"] }
nix = { version = "0.30", features = ["user", "fs"] }
syn = { version = "2.0", features = ["full"] }
bytes = "1.10.1"
tokio-stream = "0.1"


[package]
name = "rong"
version = "0.1.0"
edition = "2024"

[dependencies]
rong_core = { workspace = true }
rong_quickjs = { workspace = true, optional = true }
rong_jscore = { workspace = true, optional = true }
rong_arkjs = { workspace = true, optional = true }
rong_macro = { workspace = true }
tokio = { workspace = true }
futures = { workspace = true }

[features]
quickjs = ["rong_quickjs"]
jscore = ["rong_jscore"]
arkjs = ["rong_arkjs"]

[dev-dependencies]
rong_test = { workspace = true }

[profile.test]
debug = true
