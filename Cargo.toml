[workspace]
members = [
    "core",
    "macro",
    "quickjs", "javascriptcore", "v8",
    "utils/rong_test",
    "examples/point",
    "modules/rong_timer", "modules/rong_navigator", "modules/rong_path",
    "modules/rong_http", "modules/rong_encoding", "modules/rong_event",
    "modules/rong_assert", "modules/rong_exception",
    "modules/rong_abort", "modules/rong_console", "modules/rong_url", "modules/rong_buffer", "modules/rong_fs",
    "rong_modules", "rong_cli"
]

[workspace.dependencies]
rong = { path = "."}

[package]
name = "rong"
version = "0.1.0"
edition = "2021"

[dependencies]
rong_core = { path = "core" }
rong_quickjs = { path = "quickjs", optional = true }
rongcore = { path = "javascriptcore", optional = true }
rong_v8 = { path = "v8", optional = true }
rong_macro = { path = "macro" }
tokio = { version = "1.0", features = ["rt", "time", "macros"] }
futures = "0.3.31"

[features]
quickjs = ["rong_quickjs"]
jscore = ["rongcore"]
v8 = ["rong_v8"]
default = ["quickjs"]

[dev-dependencies]
tokio = { version = "1.0", features = ["rt", "time", "macros"] }
rong_test = { path = "utils/rong_test" }

[profile.test]
debug = true

