[workspace]
# Always try to release unpublished packages when running release command.
release_always = true

# Add a visible label on release PRs.
pr_labels = ["release"]

# Keep v-prefixed tags and avoid collisions in multi-crate workspace.
git_tag_name = "{{ package }}-v{{ version }}"

# Match release name to tag name for consistency.
git_release_name = "{{ package }}-v{{ version }}"

# Repository URL (explicit to avoid inference issues)
repo_url = "https://github.com/LingXia-Dev/Rong"

# Disable changelog updates
changelog_update = false

# Disable semver compatibility check - packages not yet published to crates.io
# cargo-semver-checks needs to download published versions for comparison,
# which fails for unpublished packages
semver_check = false

# Exclude arkjs packages from release (not published to crates.io)
[[package]]
name = "rong_arkjs"
publish = false
release = false
changelog_update = false

[[package]]
name = "rong_arkjs_sys"
publish = false
release = false
changelog_update = false

# Exclude test utilities from release (internal development tool)
[[package]]
name = "rong_test"
publish = false
release = false
changelog_update = false
