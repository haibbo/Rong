name: "Publish Packages"

run-name: "Publish ${{ inputs.package_scope }} from ${{ github.ref_name }}"

on:
  workflow_dispatch:
    inputs:
      package_scope:
        description: "Which package family to publish."
        required: true
        default: all
        type: choice
        options:
          - all
          - rust
          - npm
      rust_selection:
        description: "Rust selection passed to scripts/publish.sh, e.g. --crate rong_timer, --group engines, --changed-since v0.4.0."
        required: false
        default: "--group rust"
        type: string
      create_tags:
        description: "Create package-level git tags for published or already-published packages."
        required: true
        default: true
        type: boolean

concurrency:
  group: publish-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: macos-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Resolve publish scope
        env:
          PACKAGE_SCOPE: ${{ inputs.package_scope }}
          RUST_SELECTION: ${{ inputs.rust_selection }}
          CREATE_TAGS: ${{ inputs.create_tags }}
        run: |
          if [ "${GITHUB_REF_NAME}" != "master" ]; then
            echo "Run this workflow from master."
            exit 1
          fi

          case "$PACKAGE_SCOPE" in
            all|rust|npm)
              ;;
            *)
              echo "Unsupported package_scope: $PACKAGE_SCOPE"
              exit 1
              ;;
          esac

          if [ "$PACKAGE_SCOPE" = "all" ] || [ "$PACKAGE_SCOPE" = "rust" ]; then
            if [ -z "$RUST_SELECTION" ]; then
              echo "rust_selection is required when publishing Rust packages."
              exit 1
            fi
          fi

          {
            echo "PACKAGE_SCOPE=$PACKAGE_SCOPE"
            echo "RUST_SELECTION=$RUST_SELECTION"
            echo "CREATE_TAGS=$CREATE_TAGS"
          } >> "$GITHUB_ENV"

          {
            echo "### Package publish scope"
            echo
            echo "- Package scope: \`$PACKAGE_SCOPE\`"
            echo "- Rust selection: \`$RUST_SELECTION\`"
            echo "- Create package tags: \`$CREATE_TAGS\`"
            echo "- Creates repo-level release tag: \`false\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Install Rust
        if: inputs.package_scope == 'all' || inputs.package_scope == 'rust'
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        if: inputs.package_scope == 'all' || inputs.package_scope == 'npm'
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Install npm with trusted publishing support
        if: inputs.package_scope == 'all' || inputs.package_scope == 'npm'
        run: |
          npm install -g npm@^11.5.1
          npm --version

      - name: Cache cargo
        if: inputs.package_scope == 'all' || inputs.package_scope == 'rust'
        uses: Swatinem/rust-cache@v2

      - name: Install system dependencies (macOS)
        if: inputs.package_scope == 'all' || inputs.package_scope == 'rust'
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: |
          brew install llvm
          echo "LIBCLANG_PATH=$(brew --prefix llvm)/lib" >> "$GITHUB_ENV"

      - name: Publish crates
        if: inputs.package_scope == 'all' || inputs.package_scope == 'rust'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          read -r -a rust_args <<< "$RUST_SELECTION"
          if [ "$CREATE_TAGS" = "true" ]; then
            rust_args+=(--tag)
          fi
          ./scripts/publish.sh --yes "${rust_args[@]}"

      - name: Publish npm packages
        if: inputs.package_scope == 'all' || inputs.package_scope == 'npm'
        run: |
          npm_args=()
          if [ "$CREATE_TAGS" = "true" ]; then
            npm_args+=(--tag)
          fi
          ./scripts/publish_npm.sh "${npm_args[@]}"
