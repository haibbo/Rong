name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        include:
          - engine: quickjs
            os: macos-latest
          - engine: jscore
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-make
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-make

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: |
          brew install llvm
          echo "LIBCLANG_PATH=$(brew --prefix llvm)/lib" >> $GITHUB_ENV

      - name: Format
        run: cargo fmt --all -- --check

      - name: Check
        env:
          ENGINE: ${{ matrix.engine }}
        run: cargo make check-engine

      - name: Clippy
        env:
          ENGINE: ${{ matrix.engine }}
        run: cargo make clippy-engine

      - name: Tests
        env:
          ENGINE: ${{ matrix.engine }}
        run: cargo make test-engine
