name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_HTTP_MULTIPLEXING: "false"
  CARGO_NET_RETRY: "10"

jobs:
  scope:
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.scope.outputs.rust }}
      npm: ${{ steps.scope.outputs.npm }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Classify changes
        id: scope
        shell: bash
        run: |
          set -euo pipefail

          rust=false
          npm=false

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            rust=true
            npm=true
            printf '%s\n' "workflow_dispatch runs all CI scopes" > /tmp/changed-files.txt
          else
            head="${{ github.sha }}"
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              base="${{ github.event.pull_request.base.sha }}"
            else
              base="${{ github.event.before }}"
              if [ "$base" = "0000000000000000000000000000000000000000" ]; then
                base="$(git rev-list --max-parents=0 "$head")"
              fi
            fi

            if ! git cat-file -e "$base^{commit}" 2>/dev/null; then
              echo "Base commit $base is not available in this checkout."
              if git rev-parse "$head^" >/dev/null 2>&1; then
                base="$(git rev-parse "$head^")"
                echo "Falling back to first parent $base for changed-file scope."
              else
                base="$(git rev-list --max-parents=0 "$head")"
                echo "Falling back to root commit $base for changed-file scope."
              fi
            fi

            git diff --name-only "$base" "$head" > /tmp/changed-files.txt

            while IFS= read -r file; do
              [ -n "$file" ] || continue

              case "$file" in
                docs/api/*|docs/skills/*|packages/*|scripts/bump_version.sh|scripts/publish_npm.sh|.github/workflows/ci.yml|.github/workflows/release.yml)
                  npm=true
                  ;;
              esac

              case "$file" in
                docs/*|packages/*|scripts/bump_version.sh|scripts/publish_npm.sh|*.md|.gitignore|.gitattributes|.github/*)
                  ;;
                *)
                  rust=true
                  ;;
              esac
            done < /tmp/changed-files.txt
          fi

          {
            echo "rust=$rust"
            echo "npm=$npm"
          } >> "$GITHUB_OUTPUT"

          {
            echo "### CI scope"
            echo
            echo "- Rust/JSC matrix: \`$rust\`"
            echo "- npm packages: \`$npm\`"
            echo
            echo "Changed files:"
            sed 's/^/- `/' /tmp/changed-files.txt | sed 's/$/`/'
          } >> "$GITHUB_STEP_SUMMARY"

  fmt:
    needs: scope
    if: needs.scope.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Format
        run: cargo fmt --all -- --check

  # Informational only: shows which crates have publish-relevant changes since
  # their last release tag, and which need a version bump. Never fails the
  # build; the actual gate is publish.sh --check-drift in release planning.
  release-plan:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Compute pending release plan
        run: |
          set +e
          plan="$(./scripts/publish.sh --changed --dry-run 2>&1)"
          status=$?
          set -e
          {
            echo "### Pending release plan"
            echo
            echo "Crates with publish-relevant changes since their latest release tag:"
            echo
            echo '```'
            printf '%s\n' "$plan" | sed -E 's/\x1B\[[0-9;]*m//g'
            echo '```'
            if [ "$status" -ne 0 ]; then
              echo
              echo "publish.sh exited with status ${status}."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  npm-package:
    needs: scope
    if: needs.scope.outputs.npm == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Node
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Check Rong type package
        run: |
          npm --prefix packages/rong_types install --no-package-lock
          npm --prefix packages/rong_types run build

      - name: Check Rong skill package
        run: |
          npm --prefix packages/skill run check
          node packages/skill/bin/cli.mjs list
          rm -rf /tmp/rong-skills-ci
          node packages/skill/bin/cli.mjs install --dir /tmp/rong-skills-ci --force
          test -f /tmp/rong-skills-ci/rong-module-author/references/module-structure.md
          test -f /tmp/rong-skills-ci/rong-runtime-developer/references/api-http.md

  host-check:
    needs: [scope, fmt]
    if: needs.scope.outputs.rust == 'true'
    name: host-check-${{ matrix.engine }}-${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - engine: quickjs
            os: windows-2025-vs2026
          - engine: quickjs
            os: ubuntu-latest
          - engine: quickjs
            os: macos-latest
          - engine: jscore
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-make
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-make

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: |
          brew install llvm
          echo "LIBCLANG_PATH=$(brew --prefix llvm)/lib" >> "$GITHUB_ENV"

      - name: Check
        env:
          ENGINE: ${{ matrix.engine }}
        run: cargo make check-engine

  host-clippy:
    needs: [scope, fmt]
    if: needs.scope.outputs.rust == 'true'
    name: host-clippy-${{ matrix.engine }}-${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - engine: quickjs
            os: windows-2025-vs2026
          - engine: quickjs
            os: ubuntu-latest
          - engine: quickjs
            os: macos-latest
          - engine: jscore
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-make
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-make

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: |
          brew install llvm
          echo "LIBCLANG_PATH=$(brew --prefix llvm)/lib" >> "$GITHUB_ENV"

      - name: Clippy
        env:
          ENGINE: ${{ matrix.engine }}
        run: cargo make clippy-engine

  host-test:
    needs: [scope, fmt]
    if: needs.scope.outputs.rust == 'true'
    name: host-test-${{ matrix.engine }}-${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - engine: quickjs
            os: windows-2025-vs2026
          - engine: quickjs
            os: ubuntu-latest
          - engine: quickjs
            os: macos-latest
          - engine: jscore
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-make
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-make

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: |
          brew install llvm
          echo "LIBCLANG_PATH=$(brew --prefix llvm)/lib" >> "$GITHUB_ENV"

      - name: Test (Unix)
        if: runner.os != 'Windows'
        env:
          ENGINE: ${{ matrix.engine }}
          CARGO_TERM_COLOR: never
          RONG_TEST_TIMEOUT_SECONDS: "600"
        run: |
          set -o pipefail
          log="$RUNNER_TEMP/host-test-${{ matrix.engine }}.log"
          if ! cargo make test-engine 2>&1 | tee "$log"; then
            tail_text="$(tail -n 160 "$log")"
            tail_text="${tail_text//'%'/'%25'}"
            tail_text="${tail_text//$'\r'/'%0D'}"
            tail_text="${tail_text//$'\n'/'%0A'}"
            echo "::error title=Host test failed::$tail_text"
            exit 1
          fi

      - name: Test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          ENGINE: ${{ matrix.engine }}
          CARGO_TERM_COLOR: never
        run: |
          $log = Join-Path $env:RUNNER_TEMP "host-test-$env:ENGINE.log"
          & cargo make test-engine 2>&1 | Tee-Object -FilePath $log
          $exitCode = $LASTEXITCODE
          if ($exitCode -ne 0) {
            $tailText = (Get-Content -Path $log -Tail 160) -join "`n"
            $tailText = $tailText.Replace("%", "%25").Replace("`r", "%0D").Replace("`n", "%0A")
            Write-Output "::error title=Host test failed::$tailText"
            exit $exitCode
          }

  jscore-source-test:
    needs: [scope, fmt]
    if: needs.scope.outputs.rust == 'true'
    name: jscore-source-${{ matrix.target }} (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-2025-vs2026
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    env:
      RONG_JSC_CACHE_DIR: ${{ github.workspace }}/.jsc-cache
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Check pinned JSC source artifact
        id: source-artifact
        shell: bash
        run: |
          if grep -Eq "^${{ matrix.target }}[[:space:]]" javascriptcore/sys/webkit-artifacts.tsv; then
            echo "run_source=true" >> "$GITHUB_OUTPUT"
          else
            echo "::error title=Missing pinned JSC source artifact::No javascriptcore/sys/webkit-artifacts.tsv row for ${{ matrix.target }}."
            echo "Run build-jsc-artifacts.yml with a pinned WebKit ref, add its row, and rerun CI."
            exit 1
          fi

      - name: Install Rust
        if: steps.source-artifact.outputs.run_source == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache JSC source artifact
        if: steps.source-artifact.outputs.run_source == 'true'
        uses: actions/cache@v5
        with:
          path: ${{ env.RONG_JSC_CACHE_DIR }}/${{ matrix.target }}
          key: jsc-source-${{ matrix.target }}-${{ hashFiles('javascriptcore/sys/webkit-artifacts.tsv') }}

      - name: Cache cargo
        if: steps.source-artifact.outputs.run_source == 'true'
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-make
        if: steps.source-artifact.outputs.run_source == 'true'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-make

      - name: Install libclang (Linux)
        if: steps.source-artifact.outputs.run_source == 'true' && runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang libicu-dev

      - name: Install libclang (macOS)
        if: steps.source-artifact.outputs.run_source == 'true' && runner.os == 'macOS'
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: |
          brew install llvm
          echo "LIBCLANG_PATH=$(brew --prefix llvm)/lib" >> "$GITHUB_ENV"

      - name: Install libclang (Windows)
        if: steps.source-artifact.outputs.run_source == 'true' && runner.os == 'Windows'
        shell: pwsh
        run: |
          "LIBCLANG_PATH=C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_ENV -Append
          "C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Check JSC source backend (Unix)
        if: steps.source-artifact.outputs.run_source == 'true' && runner.os != 'Windows'
        env:
          ENGINE: jscore
          RONG_JSC_SOURCE: "1"
          RONG_JSC_DOWNLOAD: "1"
          RONG_JSC_REQUIRE_BYTECODE: "1"
          CARGO_TERM_COLOR: never
          RONG_TEST_TIMEOUT_SECONDS: "600"
        run: |
          set -o pipefail
          log="$RUNNER_TEMP/jscore-source-check.log"
          if ! cargo make check-engine 2>&1 | tee "$log"; then
            tail_text="$(tail -n 120 "$log")"
            tail_text="${tail_text//'%'/'%25'}"
            tail_text="${tail_text//$'\r'/'%0D'}"
            tail_text="${tail_text//$'\n'/'%0A'}"
            echo "::error title=JSC source check failed::$tail_text"
            exit 1
          fi

      - name: Check JSC source backend (Windows)
        if: steps.source-artifact.outputs.run_source == 'true' && runner.os == 'Windows'
        shell: pwsh
        env:
          ENGINE: jscore
          RONG_JSC_SOURCE: "1"
          RONG_JSC_DOWNLOAD: "1"
          RONG_JSC_REQUIRE_BYTECODE: "1"
          CARGO_TERM_COLOR: never
          RONG_TEST_TIMEOUT_SECONDS: "600"
        run: |
          $log = Join-Path $env:RUNNER_TEMP "jscore-source-check.log"
          & cargo make check-engine 2>&1 | Tee-Object -FilePath $log
          $exitCode = $LASTEXITCODE
          if ($exitCode -ne 0) {
            $tailText = (Get-Content -Path $log -Tail 120) -join "`n"
            $tailText = $tailText.Replace("%", "%25").Replace("`r", "%0D").Replace("`n", "%0A")
            Write-Output "::error title=JSC source check failed::$tailText"
            exit $exitCode
          }

      - name: Clippy JSC source backend (Unix)
        if: steps.source-artifact.outputs.run_source == 'true' && runner.os != 'Windows'
        env:
          ENGINE: jscore
          RONG_JSC_SOURCE: "1"
          RONG_JSC_DOWNLOAD: "1"
          RONG_JSC_REQUIRE_BYTECODE: "1"
          CARGO_TERM_COLOR: never
        run: |
          set -o pipefail
          log="$RUNNER_TEMP/jscore-source-clippy.log"
          if ! cargo make clippy-engine 2>&1 | tee "$log"; then
            tail_text="$(tail -n 120 "$log")"
            tail_text="${tail_text//'%'/'%25'}"
            tail_text="${tail_text//$'\r'/'%0D'}"
            tail_text="${tail_text//$'\n'/'%0A'}"
            echo "::error title=JSC source clippy failed::$tail_text"
            exit 1
          fi

      - name: Clippy JSC source backend (Windows)
        if: steps.source-artifact.outputs.run_source == 'true' && runner.os == 'Windows'
        shell: pwsh
        env:
          ENGINE: jscore
          RONG_JSC_SOURCE: "1"
          RONG_JSC_DOWNLOAD: "1"
          RONG_JSC_REQUIRE_BYTECODE: "1"
          CARGO_TERM_COLOR: never
        run: |
          $log = Join-Path $env:RUNNER_TEMP "jscore-source-clippy.log"
          & cargo make clippy-engine 2>&1 | Tee-Object -FilePath $log
          $exitCode = $LASTEXITCODE
          if ($exitCode -ne 0) {
            $tailText = (Get-Content -Path $log -Tail 120) -join "`n"
            $tailText = $tailText.Replace("%", "%25").Replace("`r", "%0D").Replace("`n", "%0A")
            Write-Output "::error title=JSC source clippy failed::$tailText"
            exit $exitCode
          }

      - name: Test JSC source backend (Unix)
        if: steps.source-artifact.outputs.run_source == 'true' && runner.os != 'Windows'
        env:
          ENGINE: jscore
          RONG_JSC_SOURCE: "1"
          RONG_JSC_DOWNLOAD: "1"
          RONG_JSC_REQUIRE_BYTECODE: "1"
          CARGO_TERM_COLOR: never
        run: |
          set -o pipefail
          log="$RUNNER_TEMP/jscore-source-test.log"
          if ! cargo make test-engine 2>&1 | tee "$log"; then
            tail_text="$(tail -n 120 "$log")"
            tail_text="${tail_text//'%'/'%25'}"
            tail_text="${tail_text//$'\r'/'%0D'}"
            tail_text="${tail_text//$'\n'/'%0A'}"
            echo "::error title=JSC source test failed::$tail_text"
            exit 1
          fi

      - name: Test JSC source backend (Windows)
        if: steps.source-artifact.outputs.run_source == 'true' && runner.os == 'Windows'
        shell: pwsh
        env:
          ENGINE: jscore
          RONG_JSC_SOURCE: "1"
          RONG_JSC_DOWNLOAD: "1"
          RONG_JSC_REQUIRE_BYTECODE: "1"
          CARGO_TERM_COLOR: never
        run: |
          $log = Join-Path $env:RUNNER_TEMP "jscore-source-test.log"
          & cargo make test-engine 2>&1 | Tee-Object -FilePath $log
          $exitCode = $LASTEXITCODE
          if ($exitCode -ne 0) {
            $tailText = (Get-Content -Path $log -Tail 120) -join "`n"
            $tailText = $tailText.Replace("%", "%25").Replace("`r", "%0D").Replace("`n", "%0A")
            Write-Output "::error title=JSC source test failed::$tailText"
            exit $exitCode
          }
