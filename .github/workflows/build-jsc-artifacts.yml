name: "Build JSC artifacts"

# Builds JSCOnly prebuilt artifacts from UPSTREAM WebKit and uploads them to a
# GitHub release, then emits the `webkit-artifacts.tsv` rows to paste in. Once
# those rows land, the source backend "just works" with no env var on the listed
# targets (rong_jscore_sys/build.rs downloads + verifies them on demand).
#
# Manual trigger only — building WebKit is slow and expensive. The TSV update is
# intentionally a human-reviewed paste step (you want to eyeball the tag + sha
# before the whole world auto-downloads it).

on:
  workflow_dispatch:
    inputs:
      webkit_ref:
        description: "WebKit tag/branch/sha to build (PIN a tag for reproducible artifacts)"
        required: true
        default: "main"
      release_tag:
        description: "Single GitHub release tag for this artifact set (created if missing)"
        required: true
      target:
        description: "Target to build"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - x86_64-apple-darwin
          - x86_64-unknown-linux-gnu
          - x86_64-pc-windows-msvc

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ inputs.release_tag }}
  cancel-in-progress: false

jobs:
  select-targets:
    name: select-targets
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      webkit_sha: ${{ steps.webkit-ref.outputs.sha }}
    steps:
      - name: Build matrix
        id: matrix
        shell: bash
        run: |
          case "${{ inputs.target }}" in
            all)
              include='[{"target":"x86_64-apple-darwin","os":"macos-15-intel"},{"target":"x86_64-unknown-linux-gnu","os":"ubuntu-latest"},{"target":"x86_64-pc-windows-msvc","os":"windows-latest"}]'
              ;;
            x86_64-apple-darwin)
              include='[{"target":"x86_64-apple-darwin","os":"macos-15-intel"}]'
              ;;
            x86_64-unknown-linux-gnu)
              include='[{"target":"x86_64-unknown-linux-gnu","os":"ubuntu-latest"}]'
              ;;
            x86_64-pc-windows-msvc)
              include='[{"target":"x86_64-pc-windows-msvc","os":"windows-latest"}]'
              ;;
            *)
              echo "Unsupported target: ${{ inputs.target }}" >&2
              exit 1
              ;;
          esac
          echo "matrix={\"include\":$include}" >> "$GITHUB_OUTPUT"

      - name: Resolve WebKit ref
        id: webkit-ref
        shell: bash
        run: |
          set -euo pipefail
          ref="${{ inputs.webkit_ref }}"
          url="${WEBKIT_URL:-https://github.com/WebKit/WebKit.git}"
          if [[ "$ref" =~ ^[0-9a-fA-F]{40}$ ]]; then
            sha="${ref,,}"
          else
            refs="$(git ls-remote "$url" "refs/heads/$ref" "refs/tags/$ref^{}" "refs/tags/$ref" "$ref")"
            sha="$(awk '$2 ~ /\^\{\}$/ { print $1; exit }' <<< "$refs")"
            if [[ -z "$sha" ]]; then
              sha="$(awk 'NR == 1 { print $1 }' <<< "$refs")"
            fi
          fi
          if ! [[ "$sha" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Unable to resolve WebKit ref: $ref" >&2
            exit 1
          fi
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          {
            echo "## WebKit source"
            echo ""
            echo "- requested ref: \`$ref\`"
            echo "- resolved commit: \`$sha\`"
          } >> "$GITHUB_STEP_SUMMARY"

  build:
    name: build-${{ matrix.target }}
    needs: select-targets
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.select-targets.outputs.matrix) }}
    runs-on: ${{ matrix.os }}
    env:
      PKG: rong-webkit-${{ matrix.target }}.tar.gz
      RONG_JSC_VCPKG_ROOT: C:/vcpkg
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust (for host triple detection)
        uses: dtolnay/rust-toolchain@stable

      - name: Install build deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          # Best-effort JSCOnly/CMake build deps; expand if build-jsc complains.
          # build-essential: gcc/g++/make for the static-ICU source build.
          # No libicu-dev: a static ICU is built from source and linked via ICU_ROOT,
          # so the system shared ICU must not shadow it.
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build ruby perl python3 gperf bison flex \
            clang build-essential libssl-dev libcurl4-openssl-dev \
            libsqlite3-dev libxml2-dev libxslt1-dev zlib1g-dev pkg-config

      - name: Set up MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Set up Ruby (Windows)
        if: runner.os == 'Windows'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Install build deps (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install -y --no-progress ninja gperf strawberryperl
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

          $tools = Join-Path $env:RUNNER_TEMP "winflexbison"
          New-Item -ItemType Directory -Force -Path $tools | Out-Null
          $zip = Join-Path $tools "win_flex_bison.zip"
          $url = "https://github.com/lexxmark/winflexbison/releases/download/v2.5.24/win_flex_bison-2.5.24.zip"
          for ($attempt = 1; $attempt -le 8; $attempt++) {
            & curl.exe -fL --retry 3 --retry-all-errors --retry-delay 10 --connect-timeout 30 --max-time 600 $url -o $zip
            $curlExit = $LASTEXITCODE
            if ($curlExit -eq 0) {
              break
            }
            if ($attempt -eq 8) {
              exit $curlExit
            }
            Write-Host "winflexbison download failed; retrying in 15s ($attempt/8)"
            Start-Sleep -Seconds 15
          }
          Expand-Archive -Path $zip -DestinationPath $tools -Force
          $winFlex = Get-ChildItem -Path $tools -Recurse -Filter "win_flex.exe" | Select-Object -First 1
          $winBison = Get-ChildItem -Path $tools -Recurse -Filter "win_bison.exe" | Select-Object -First 1
          if (-not $winFlex -or -not $winBison) {
            throw "winflexbison archive did not contain win_flex.exe and win_bison.exe"
          }

          $shim = Join-Path $env:RUNNER_TEMP "webkit-tool-shims"
          New-Item -ItemType Directory -Force -Path $shim | Out-Null
          Copy-Item $winFlex.FullName (Join-Path $shim "flex.exe")
          Copy-Item $winBison.FullName (Join-Path $shim "bison.exe")
          $shim | Out-File -FilePath $env:GITHUB_PATH -Append
          "C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Prefetch vcpkg downloads (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $downloads = "C:\vcpkg\downloads"
          New-Item -ItemType Directory -Force -Path $downloads | Out-Null
          $items = @(
            @{
              Name = "vcpkg cmake"
              Url = "https://github.com/Kitware/CMake/releases/download/v4.3.2/cmake-4.3.2-windows-x86_64.zip"
              File = "cmake-4.3.2-windows-x86_64.zip"
            }
            @{
              Name = "vcpkg 7zip"
              Url = "https://github.com/ip7z/7zip/releases/download/26.01/7z2601-x64.exe"
              File = "7z2601-x64.7z.exe"
            }
            @{
              Name = "vcpkg 7zr"
              Url = "https://github.com/ip7z/7zip/releases/download/26.01/7zr.exe"
              File = "f798fab8-7zr.exe"
            }
            @{
              Name = "vcpkg powershell"
              Url = "https://github.com/PowerShell/PowerShell/releases/download/v7.6.1/PowerShell-7.6.1-win-x64.zip"
              File = "PowerShell-7.6.1-win-x64.zip"
            }
            @{
              Name = "vcpkg ninja"
              Url = "https://github.com/ninja-build/ninja/releases/download/v1.13.2/ninja-win.zip"
              File = "ninja-win-1.13.2.zip"
            }
            @{
              Name = "vcpkg ICU"
              Url = "https://github.com/unicode-org/icu/releases/download/release-77-1/icu4c-77_1-src.tgz"
              File = "icu4c-77_1-src.tgz"
            }
          )

          foreach ($item in $items) {
            $file = Join-Path $downloads $item.File
            $tmp = "$file.tmp"
            for ($attempt = 1; $attempt -le 8; $attempt++) {
              if (Test-Path $tmp) {
                Remove-Item -Force $tmp
              }
              & curl.exe -fL --retry 3 --retry-all-errors --retry-delay 10 --connect-timeout 30 --max-time 600 $item.Url -o $tmp
              $curlExit = $LASTEXITCODE
              if ($curlExit -eq 0) {
                Move-Item -Force $tmp $file
                break
              }
              if ($attempt -eq 8) {
                exit $curlExit
              }
              Write-Host "$($item.Name) download failed; retrying in 15s ($attempt/8)"
              Start-Sleep -Seconds 15
            }
          }

      - name: Select full Xcode (macOS)
        if: runner.os == 'macOS'
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build artifact
        shell: bash
        run: |
          bash scripts/build_jsc_artifact.sh \
            --webkit-ref "${{ needs.select-targets.outputs.webkit_sha }}" \
            --target "${{ matrix.target }}" \
            --out "${{ runner.temp }}/artifact" \
            --package "${{ runner.temp }}/$PKG"

      - name: Compute checksum and TSV row
        shell: bash
        run: |
          if command -v shasum >/dev/null 2>&1; then
            sha="$(shasum -a 256 "${{ runner.temp }}/$PKG" | awk '{print $1}')"
          else
            sha="$(sha256sum "${{ runner.temp }}/$PKG" | awk '{print $1}')"
          fi
          sha="${sha#\\}"
          sha="${sha//$'\r'/}"
          if ! [[ "$sha" =~ ^[0-9a-f]{64}$ ]]; then
            echo "invalid sha256: $sha" >&2
            exit 1
          fi
          row="${{ matrix.target }}	${{ inputs.release_tag }}	$PKG	$sha"
          echo "$row" > "${{ runner.temp }}/row-${{ matrix.target }}.tsv"
          {
            echo "### ${{ matrix.target }}"
            echo '```'
            echo "$row"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          # Idempotent and safe under the parallel matrix: `create` no-ops if the
          # release already exists (another leg won the race); `upload --clobber`
          # overwrites an earlier copy.
          notes="${{ runner.temp }}/jsc-artifact-release-notes.md"
          cat > "$notes" <<'EOF'
          Prebuilt JSCOnly artifacts for the rong source backend.

          WebKit requested ref: ${{ inputs.webkit_ref }}
          WebKit resolved commit: ${{ needs.select-targets.outputs.webkit_sha }}
          EOF
          gh release create "${{ inputs.release_tag }}" \
            --title "${{ inputs.release_tag }}" \
            --notes-file "$notes" \
            2>/dev/null || true
          gh release upload "${{ inputs.release_tag }}" "${{ runner.temp }}/$PKG" --clobber

      - name: Test released artifact download
        shell: bash
        env:
          RONG_JSC_SOURCE: "1"
          RONG_JSC_DOWNLOAD: "1"
          RONG_JSC_REQUIRE_BYTECODE: "1"
          RONG_JSC_CACHE_DIR: ${{ runner.temp }}/jsc-release-download-cache
          CARGO_TARGET_DIR: ${{ runner.temp }}/target-jsc-release-download
        run: |
          set -euo pipefail
          row_file="${{ runner.temp }}/row-${{ matrix.target }}.tsv"
          awk '$1 != "${{ matrix.target }}"' javascriptcore/sys/webkit-artifacts.tsv > javascriptcore/sys/webkit-artifacts.next.tsv
          cat "$row_file" >> javascriptcore/sys/webkit-artifacts.next.tsv
          mv javascriptcore/sys/webkit-artifacts.next.tsv javascriptcore/sys/webkit-artifacts.tsv
          rm -rf "$RONG_JSC_CACHE_DIR" "$CARGO_TARGET_DIR"
          release_asset_url="https://github.com/${{ github.repository }}/releases/download/${{ inputs.release_tag }}/$PKG"
          for attempt in {1..20}; do
            if curl -fsSL --range 0-1023 --retry 3 --retry-all-errors --retry-delay 5 --max-time 120 \
              -o /dev/null "$release_asset_url"; then
              break
            fi
            if [[ "$attempt" -eq 20 ]]; then
              echo "release asset is not downloadable: $release_asset_url" >&2
              exit 1
            fi
            echo "release asset not ready yet; retrying in 15s ($attempt/20)"
            sleep 15
          done
          case "${{ matrix.target }}" in
            *-apple-*)
              export RUSTFLAGS="${RUSTFLAGS:-} -C link-arg=-Wl,-rpath,$RONG_JSC_CACHE_DIR/${{ matrix.target }}/lib"
              ;;
            *-pc-windows-msvc)
              msvc_bin=""
              msvc_bin="$(cygpath -u "${VCToolsInstallDir%\\}/bin/HostX64/x64")"
              msvc_linker=""
              msvc_linker="$(cygpath -am "${VCToolsInstallDir%\\}/bin/HostX64/x64/link.exe")"
              export PATH="$msvc_bin:$PATH"
              export CARGO_TARGET_X86_64_PC_WINDOWS_MSVC_LINKER="$msvc_linker"
              ;;
          esac

          cargo test --release --test eval --no-default-features \
            --features jscore-source,tls-aws-lc --quiet

          artifact_dir="$RONG_JSC_CACHE_DIR/${{ matrix.target }}"
          test -f "$artifact_dir/include/JavaScriptCore/JavaScript.h"
          test -d "$artifact_dir/lib"

      - name: Upload TSV row (workflow artifact)
        uses: actions/upload-artifact@v4
        with:
          name: tsv-row-${{ matrix.target }}
          path: ${{ runner.temp }}/row-${{ matrix.target }}.tsv

  collect-rows:
    name: collect-tsv-rows
    needs: build
    # Run even if some targets failed, so the summary still has the rows that
    # did build (each target also uploads its artifact + release asset on its own).
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Download all rows
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: tsv-row-*
          path: rows
          merge-multiple: true

      - name: Assemble webkit-artifacts.tsv additions
        run: |
          if compgen -G "rows/*.tsv" >/dev/null; then
            cat rows/*.tsv | sort > webkit-artifacts.additions.tsv
          else
            : > webkit-artifacts.additions.tsv
          fi
          {
            echo "## Paste these rows into javascriptcore/sys/webkit-artifacts.tsv"
            echo '```'
            cat webkit-artifacts.additions.tsv
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload combined additions
        uses: actions/upload-artifact@v4
        with:
          name: webkit-artifacts-additions
          path: webkit-artifacts.additions.tsv
