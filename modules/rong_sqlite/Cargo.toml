[package]
name = "rong_sqlite"
version.workspace = true
edition.workspace = true

description = "SQLite module for RongJS"
license.workspace = true
repository.workspace = true
readme.workspace = true

[dependencies]
rong = { workspace = true }
rusqlite = { version = "0.32", features = ["bundled"] }

[features]
default = []
quickjs = ["rong/quickjs"]
jscore = ["rong/jscore"]
arkjs = ["rong/arkjs"]

[dev-dependencies]
rong_test = { workspace = true }
rong_assert = { path = "../rong_assert", version = "0.2.0" }
rong_console = { path = "../rong_console", version = "0.2.0" }
