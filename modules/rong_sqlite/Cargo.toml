[package]
name = "rong_sqlite"
version.workspace = true
edition.workspace = true

description = "SQLite module for RongJS"
license.workspace = true
repository.workspace = true
homepage.workspace = true
rust-version.workspace = true
keywords.workspace = true
categories.workspace = true
documentation = "https://docs.rs/rong_sqlite"
readme = "README.md"

[dependencies]
rong = { workspace = true }
rusqlite = { version = "0.32", features = ["bundled"] }

[features]
default = []
quickjs = ["rong/quickjs"]
jscore = ["rong/jscore"]
arkjs = ["rong/arkjs"]
tls-aws-lc = ["rong/tls-aws-lc"]
tls-ring = ["rong/tls-ring"]

[dev-dependencies]
rong_test = { path = "../../testing/rong_test" }
rong_assert = { workspace = true }
rong_console = { workspace = true }
