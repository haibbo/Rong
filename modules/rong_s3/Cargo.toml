[package]
name = "rong_s3"
version.workspace = true
edition.workspace = true

description = "S3-compatible object storage module for RongJS"
license.workspace = true
repository.workspace = true
homepage.workspace = true
rust-version.workspace = true
keywords.workspace = true
categories.workspace = true
documentation = "https://docs.rs/rong_s3"
readme = "README.md"

[dependencies]
rong = { workspace = true }
tokio = { workspace = true }
rust-s3 = { version = "0.36", default-features = false, features = ["tokio-rustls-tls", "fail-on-err"] }
serde = { workspace = true }
serde_json = { workspace = true }
bytes = { workspace = true }
chrono = { workspace = true }

[features]
quickjs = ["rong/quickjs"]
jscore = ["rong/jscore"]
arkjs = ["rong/arkjs"]
tls-aws-lc = ["rong/tls-aws-lc"]
tls-ring = ["rong/tls-ring"]

[dev-dependencies]
rong_test = { workspace = true }
rong_assert = { workspace = true }
rong_console = { workspace = true }
rong_timer = { workspace = true }
s3s = "0.13"
s3s-fs = "0.13"
hyper-util = { version = "0.1", features = ["server-auto", "tokio"] }
tempfile = "3"
