[package]
name = "rong_storage"
version.workspace = true
edition.workspace = true

description = "Storage module for RongJS"
license.workspace = true
repository.workspace = true
readme.workspace = true
[dependencies]
rong = { workspace = true }
futures = { workspace = true }
tokio = { workspace = true }
rong_abort = { workspace = true }
rong_exception = { workspace = true }
redb = "3.1.0"
serde = { workspace = true, version = "1.0", features = ["derive"] }
serde_json = "1.0"

[features]
# Forward JS engine features to the main rong crate
quickjs = ["rong/quickjs"]
jscore = ["rong/jscore"]
arkjs = ["rong/arkjs"]

[dev-dependencies]
rong_test = { workspace = true }
rong_encoding = { workspace = true }
rong_console = { workspace = true }
rong_assert = { workspace = true }
