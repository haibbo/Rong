[package]
name = "rong_storage"
version = "0.4.0"
edition.workspace = true

description = "Storage module for RongJS"
license.workspace = true
repository.workspace = true
homepage.workspace = true
rust-version.workspace = true
keywords.workspace = true
categories.workspace = true
documentation = "https://docs.rs/rong_storage"
readme = "README.md"
[dependencies]
rong = { workspace = true }
futures = { workspace = true }
tokio = { workspace = true }
rong_abort = { workspace = true }
rong_exception = { workspace = true }
redb = "4.0"
serde = { workspace = true, features = ["derive"] }
serde_json = "1.0"

[features]
# Forward JS engine features to the main rong crate
default = []
quickjs = ["rong/quickjs", "rong_abort/quickjs", "rong_exception/quickjs"]
jscore = ["rong/jscore", "rong_abort/jscore", "rong_exception/jscore"]
arkjs = ["rong/arkjs", "rong_abort/arkjs", "rong_exception/arkjs"]
tls-aws-lc = ["rong/tls-aws-lc"]
tls-ring = ["rong/tls-ring"]

[dev-dependencies]
rong_test = { path = "../../testing/rong_test" }
rong_encoding = { workspace = true }
rong_console = { workspace = true }
rong_assert = { workspace = true }
