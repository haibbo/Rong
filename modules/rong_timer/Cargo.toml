[package]
name = "rong_timer"
version.workspace = true
edition.workspace = true

description = "Timer module for RongJS"
license.workspace = true
repository.workspace = true
homepage.workspace = true
rust-version.workspace = true
keywords.workspace = true
categories.workspace = true
documentation = "https://docs.rs/rong_timer"
readme = "README.md"
[dependencies]
rong = { workspace = true }
rong_rt = { workspace = true }
tokio = { workspace = true }
futures = { workspace = true }

[features]
# Forward JS engine features to the main rong crate
default = []
quickjs = ["rong/quickjs"]
jscore = ["rong/jscore"]
arkjs = ["rong/arkjs"]

[dev-dependencies]
rong_test = { path = "../../utils/rong_test" }
rong_console = { path = "../rong_console" }
rong_assert = { path = "../rong_assert" }
