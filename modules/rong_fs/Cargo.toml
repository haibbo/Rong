[package]
name = "rong_fs"
version.workspace = true
edition.workspace = true

description = "Filesystem module for RongJS"
license.workspace = true
repository.workspace = true
readme.workspace = true
[dependencies]
rong = { workspace = true }
futures = { workspace = true }
tokio = { workspace = true }
rong_abort = { workspace = true }
rong_exception = { workspace = true }
rong_stream = { workspace = true }
bytes = { workspace = true }
filetime = "0.2"
nix = { workspace = true }

[features]
# Forward JS engine features to the main rong crate
default = ["quickjs"]
quickjs = ["rong/quickjs"]
jscore = ["rong/jscore"]
arkjs = ["rong/arkjs"]

[dev-dependencies]
rong_test = { path = "../../utils/rong_test" }
rong_encoding = { path = "../rong_encoding" }
rong_console = { path = "../rong_console" }
rong_assert = { path = "../rong_assert" }
