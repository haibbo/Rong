[package]
name = "rong_redis"
version = "0.4.0"
edition.workspace = true

description = "Redis client module for RongJS"
license.workspace = true
repository.workspace = true
homepage.workspace = true
rust-version.workspace = true
keywords.workspace = true
categories.workspace = true
documentation = "https://docs.rs/rong_redis"
readme = "README.md"

[dependencies]
rong = { workspace = true }
rong_abort = { workspace = true }
tokio = { workspace = true }
redis = { workspace = true }
futures = { workspace = true }

[features]
# Forward JS engine features to the main rong crate
quickjs = ["rong/quickjs"]
jscore = ["rong/jscore"]
arkjs = ["rong/arkjs"]
tls-aws-lc = ["rong/tls-aws-lc"]
tls-ring = ["rong/tls-ring"]

[dev-dependencies]
rong_test = { path = "../../testing/rong_test" }
rong_assert = { workspace = true }
rong_console = { workspace = true }
rong_timer = { workspace = true }
