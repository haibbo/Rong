[package]
name = "rong_stream"
version.workspace = true
edition.workspace = true

description = "Stream module for RongJS"
license.workspace = true
repository.workspace = true
homepage.workspace = true
rust-version.workspace = true
keywords.workspace = true
categories.workspace = true
documentation = "https://docs.rs/rong_stream"
readme = "README.md"
[lib]
name = "rong_stream"
path = "src/lib.rs"

[dependencies]
rong = { workspace = true }
tokio = { workspace = true }
bytes = { workspace = true }
futures = { workspace = true }
rong_abort = { workspace = true }
tokio-stream = { workspace = true }
flate2 = { workspace = true }

[dev-dependencies]
rong_test = { workspace = true }
rong_console = { workspace = true }
rong_assert = { workspace = true }
rong_encoding = { workspace = true }
rong_timer = { workspace = true }

[features]
# Forward JS engine features to the main rong crate
default = []
quickjs = ["rong/quickjs", "rong_abort/quickjs"]
jscore = ["rong/jscore", "rong_abort/jscore"]
arkjs = ["rong/arkjs", "rong_abort/arkjs"]
