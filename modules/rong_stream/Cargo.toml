[package]
name = "rong_stream"
version.workspace = true
edition.workspace = true

description = "Stream module for RongJS"
license.workspace = true
repository.workspace = true
readme.workspace = true
[lib]
name = "rong_stream"
path = "src/lib.rs"

[dependencies]
rong = { workspace = true }
tokio = { workspace = true }
bytes = { workspace = true }
futures = { workspace = true }
rong_abort = { workspace = true }
tokio-stream = { workspace = true }

[dev-dependencies]
rong_test = { path = "../../utils/rong_test" }
rong_console = { path = "../rong_console" }
rong_assert = { path = "../rong_assert" }
rong_encoding = { path = "../rong_encoding" }
rong_timer = { path = "../rong_timer" }

[features]
# Forward JS engine features to the main rong crate
default = ["quickjs"]
quickjs = ["rong/quickjs"]
jscore = ["rong/jscore"]
arkjs = ["rong/arkjs"]
