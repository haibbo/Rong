[package]
name = "rong_url"
version = "0.1.0"
edition = "2024"

[dependencies]
rong = { workspace = true }
url = "2.5.4"

[features]
# Forward JS engine features to the main rong crate
quickjs = ["rong/quickjs"]
jscore = ["rong/jscore"]
v8 = ["rong/v8"]
