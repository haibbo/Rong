[package]
name = "rong_url"
version.workspace = true
edition.workspace = true

description = "URL module for RongJS"
license.workspace = true
repository.workspace = true
readme.workspace = true
[dependencies]
rong = { workspace = true }
url = "2.5.4"

[features]
# Forward JS engine features to the main rong crate
default = ["quickjs"]
quickjs = ["rong/quickjs"]
jscore = ["rong/jscore"]
arkjs = ["rong/arkjs"]

[dev-dependencies]
rong_test = { path = "../../utils/rong_test" }
rong_assert = { path = "../rong_assert" }
rong_console = { path = "../rong_console" }
